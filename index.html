<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ember</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
:root,[data-theme="light-amber"]{
  --bg:#FFF8F0;--bg2:#FFEEDD;--bg3:#FFD9B3;
  --text:#2A1A0A;--text2:#6B4226;--text3:#9E6B42;
  --accent:#D67933;--accent2:#B85E1E;--accentbg:#FFF0E0;
  --blue:#2772A3;--bluebg:#E8F3FB;--bluedark:#1A5580;
  --border:rgba(214,121,51,0.2);--border2:rgba(214,121,51,0.4);
  --card:#FFFAF5;--card2:#FFF4E8;
  --shadow:rgba(214,121,51,0.15);
  --nav:#FFFAF5;--navborder:rgba(214,121,51,0.15);
  --pill:#FFF0E0;--pilltext:#B85E1E;
  --online:#4CAF50;--read:#2772A3;
  --input:#FFF8F2;--inputborder:rgba(214,121,51,0.3);
  --danger:#E24B4A;--dangerbg:#FFF0F0;
}
[data-theme="dark-amber"]{
  --bg:#1A0D05;--bg2:#2A1608;--bg3:#3D2010;
  --text:#FFE8CC;--text2:#D4A574;--text3:#A06835;
  --accent:#E8924A;--accent2:#FF9F5A;--accentbg:#2A1608;
  --blue:#5BA8D4;--bluebg:#0D2235;--bluedark:#7BBDE0;
  --border:rgba(232,146,74,0.2);--border2:rgba(232,146,74,0.4);
  --card:#220E04;--card2:#2E1508;
  --shadow:rgba(0,0,0,0.4);
  --nav:#1E0F05;--navborder:rgba(232,146,74,0.1);
  --pill:#2A1608;--pilltext:#E8924A;
  --online:#66BB6A;--read:#5BA8D4;
  --input:#1E0F05;--inputborder:rgba(232,146,74,0.3);
  --danger:#FF6B6B;--dangerbg:#2A0808;
}
[data-theme="light-lapis"]{
  --bg:#F0F6FF;--bg2:#E0EEFF;--bg3:#C8DDFF;
  --text:#0A1A2A;--text2:#1A3A5C;--text3:#2E5A82;
  --accent:#2772A3;--accent2:#1A5580;--accentbg:#E0EEFF;
  --blue:#D67933;--bluebg:#FFF3E4;--bluedark:#B85E1E;
  --border:rgba(39,114,163,0.2);--border2:rgba(39,114,163,0.4);
  --card:#F8FBFF;--card2:#EEF5FF;
  --shadow:rgba(39,114,163,0.15);
  --nav:#F8FBFF;--navborder:rgba(39,114,163,0.15);
  --pill:#E0EEFF;--pilltext:#1A5580;
  --online:#4CAF50;--read:#D67933;
  --input:#F0F6FF;--inputborder:rgba(39,114,163,0.3);
  --danger:#E24B4A;--dangerbg:#FFF0F0;
}
[data-theme="dark-lapis"]{
  --bg:#05101A;--bg2:#081A2A;--bg3:#0D253D;
  --text:#CCE4FF;--text2:#74A8D4;--text3:#35688A;
  --accent:#4A9DCE;--accent2:#5AAFE0;--accentbg:#081A2A;
  --blue:#E8924A;--bluebg:#2A1500;--bluedark:#FF9F5A;
  --border:rgba(74,157,206,0.2);--border2:rgba(74,157,206,0.4);
  --card:#061320;--card2:#0A1C2E;
  --shadow:rgba(0,0,0,0.4);
  --nav:#041018;--navborder:rgba(74,157,206,0.1);
  --pill:#081A2A;--pilltext:#4A9DCE;
  --online:#66BB6A;--read:#E8924A;
  --input:#041018;--inputborder:rgba(74,157,206,0.3);
  --danger:#FF6B6B;--dangerbg:#1A0808;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Lato',sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s;}

/* ===== AUTH ===== */
#auth-page{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:1000;}
.auth-glow{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 40%, var(--accentbg) 0%, transparent 70%);pointer-events:none;}
.auth-box{position:relative;z-index:1;text-align:center;padding:3rem 2.5rem;background:var(--card);border:1px solid var(--border2);border-radius:24px;max-width:440px;width:90%;box-shadow:0 8px 60px var(--shadow);}
.ember-logo{font-family:'Cinzel',serif;font-size:2.8rem;font-weight:600;color:var(--accent);letter-spacing:.1em;margin-bottom:.2rem;}
.ember-tagline{color:var(--text3);font-size:.9rem;margin-bottom:2.5rem;letter-spacing:.05em;}
.auth-divider{display:flex;align-items:center;gap:.75rem;margin:1.5rem 0;color:var(--text3);font-size:.8rem;}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.btn-google{width:100%;padding:.85rem;border-radius:12px;border:1px solid var(--border2);background:var(--card2);color:var(--text);font-family:'Lato',sans-serif;font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.75rem;transition:all .2s;}
.btn-google:hover{background:var(--bg2);border-color:var(--accent);}
.btn-guest{width:100%;padding:.85rem;border-radius:12px;background:var(--accent);border:none;color:#fff;font-family:'Lato',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.75rem;transition:all .2s;margin-top:.75rem;}
.btn-guest:hover{opacity:.9;transform:translateY(-1px);}
.auth-note{margin-top:1rem;font-size:.78rem;color:var(--text3);}

/* ===== APP SHELL ===== */
#app{display:none;height:100vh;flex-direction:row;overflow:hidden;}
#app.visible{display:flex;}

/* ===== SIDEBAR ===== */
#sidebar{width:220px;min-width:220px;background:var(--nav);border-right:1px solid var(--navborder);display:flex;flex-direction:column;height:100vh;position:relative;z-index:100;flex-shrink:0;}
.sidebar-logo{padding:1.2rem 1.2rem .8rem;font-family:'Cinzel',serif;font-size:1.4rem;font-weight:600;color:var(--accent);letter-spacing:.08em;}
.sidebar-nav{flex:1;overflow-y:auto;padding:.5rem;}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.65rem .85rem;border-radius:10px;cursor:pointer;font-size:.9rem;color:var(--text2);transition:all .15s;position:relative;border:none;background:transparent;width:100%;text-align:left;font-family:'Lato',sans-serif;}
.nav-item:hover{background:var(--bg2);color:var(--text);}
.nav-item.active{background:var(--accentbg);color:var(--accent);font-weight:700;}
.nav-item svg{width:18px;height:18px;flex-shrink:0;}
.sidebar-bottom{padding:.75rem .5rem;border-top:1px solid var(--border);}
.sidebar-user{display:flex;align-items:center;gap:.65rem;padding:.6rem .85rem;border-radius:10px;cursor:pointer;}
.sidebar-user:hover{background:var(--bg2);}
.user-av{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#fff;flex-shrink:0;}
.user-name{font-size:.85rem;color:var(--text);font-weight:600;}
.user-tag{font-size:.72rem;color:var(--text3);}

/* ===== MAIN ===== */
#main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0;}

/* ===== TOPBAR ===== */
#topbar{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.5rem;border-bottom:1px solid var(--navborder);background:var(--nav);flex-shrink:0;z-index:50;}
.topbar-title{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--accent);}
.icon-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .2s;}
.icon-btn:hover{background:var(--bg2);color:var(--text);}

/* Host Project button in topbar */
.host-project-btn{display:none;align-items:center;gap:.45rem;padding:.45rem .85rem;border-radius:10px;background:var(--accent);border:none;color:#fff;font-family:'Lato',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .2s;flex-shrink:0;}
.host-project-btn:hover{opacity:.9;transform:translateY(-1px);}
.host-project-btn svg{width:14px;height:14px;}
.host-project-btn.visible{display:flex;}

/* ===== CONTENT AREA ===== */
#content{flex:1;overflow-y:auto;padding:1.25rem;max-width:680px;margin:0 auto;width:100%;}

/* ===== FAB ===== */
#fab-btn{position:fixed;right:24px;bottom:24px;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:1.5rem;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 20px var(--shadow);transition:all .2s;z-index:200;}
#fab-btn:hover{transform:scale(1.1);}
#fab-btn.visible{display:flex;}

/* ===== CARDS ===== */
.post-card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:1rem;overflow:hidden;transition:box-shadow .2s;position:relative;}
.post-card:hover{box-shadow:0 4px 24px var(--shadow);}
.post-header{display:flex;align-items:center;gap:.75rem;padding:1rem 1rem .5rem;}
.post-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:#fff;cursor:pointer;flex-shrink:0;}
.post-username{font-weight:700;font-size:.9rem;cursor:pointer;color:var(--text);}
.post-username:hover{color:var(--accent);}
.post-time{font-size:.75rem;color:var(--text3);}
.post-body{padding:.25rem 1rem .5rem;font-size:.92rem;line-height:1.6;color:var(--text);}
.post-title{padding:.25rem 1rem 0;font-size:.85rem;font-weight:700;color:var(--text2);}
.post-media{width:100%;max-height:400px;object-fit:cover;display:block;background:var(--bg2);}
.post-media-video{width:100%;max-height:400px;display:block;background:#000;}
.post-footer{display:flex;gap:.5rem;padding:.5rem 1rem .75rem;border-top:1px solid var(--border);flex-wrap:wrap;}
.post-action{display:flex;align-items:center;gap:.4rem;font-size:.83rem;color:var(--text3);cursor:pointer;padding:.3rem .5rem;border-radius:8px;transition:all .15s;border:none;background:transparent;font-family:'Lato',sans-serif;}
.post-action:hover{background:var(--bg2);color:var(--text);}
.post-action.liked{color:var(--accent);}
.post-action.danger:hover{background:var(--dangerbg);color:var(--danger);}
.post-delete-btn{position:absolute;top:.75rem;right:.75rem;width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--card);cursor:pointer;color:var(--text3);display:none;align-items:center;justify-content:center;transition:all .2s;font-size:.75rem;}
.post-card:hover .post-delete-btn{display:flex;}
.post-delete-btn:hover{background:var(--dangerbg);color:var(--danger);border-color:var(--danger);}

/* ===== UPLOAD MEDIA BOX ===== */
.media-upload-box{
  width:100%;aspect-ratio:4/3;border-radius:14px;border:2px dashed var(--border2);
  background:var(--bg2);display:flex;flex-direction:column;align-items:center;
  justify-content:center;cursor:pointer;transition:all .25s;position:relative;
  overflow:hidden;gap:.6rem;color:var(--text3);
}
.media-upload-box:hover{border-color:var(--accent);background:var(--accentbg);}
.media-upload-box input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.media-upload-box svg{width:36px;height:36px;opacity:.5;}
.media-upload-box span{font-size:.88rem;font-weight:600;}
.media-upload-box small{font-size:.75rem;opacity:.6;}
.media-upload-box.has-media{border-style:solid;border-color:var(--accent);}
.upload-thumb{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:12px;}
.upload-thumb-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:12px;}
.upload-thumb-overlay{position:absolute;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;border-radius:12px;opacity:0;transition:opacity .2s;}
.media-upload-box:hover .upload-thumb-overlay{opacity:1;}
.upload-thumb-overlay span{color:#fff;font-size:.82rem;font-weight:700;background:rgba(0,0,0,.5);padding:.3rem .75rem;border-radius:20px;}

/* ===== POLLS ===== */
.poll-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem;margin-bottom:1rem;position:relative;}
.poll-category{display:inline-block;padding:.25rem .65rem;border-radius:20px;font-size:.75rem;font-weight:700;background:var(--pill);color:var(--pilltext);margin-bottom:.5rem;}
.poll-q{font-weight:700;font-size:1.05rem;color:var(--text);margin-bottom:.25rem;}
.poll-sub{font-size:.85rem;color:var(--text2);margin-bottom:.85rem;}
.poll-opt{width:100%;padding:.65rem .9rem;border-radius:10px;border:1px solid var(--border2);background:var(--card2);color:var(--text);font-family:'Lato',sans-serif;font-size:.88rem;cursor:pointer;text-align:left;margin-bottom:.4rem;transition:all .2s;position:relative;overflow:hidden;display:block;}
.poll-opt:hover{border-color:var(--accent);background:var(--accentbg);}
.poll-opt.voted{border-color:var(--accent);color:var(--accent);font-weight:700;}
.poll-bar{position:absolute;left:0;top:0;height:100%;background:var(--accentbg);opacity:.6;transition:width .4s;border-radius:10px;}
.poll-pct{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);font-size:.8rem;font-weight:700;color:var(--accent);}
.poll-meta{font-size:.75rem;color:var(--text3);margin-top:.5rem;}
.poll-delete-btn{position:absolute;top:.75rem;right:.75rem;width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--card);cursor:pointer;color:var(--text3);display:none;align-items:center;justify-content:center;transition:all .2s;font-size:.75rem;}
.poll-card:hover .poll-delete-btn{display:flex;}
.poll-delete-btn:hover{background:var(--dangerbg);color:var(--danger);border-color:var(--danger);}

/* ===== CHATS ===== */
.chat-layout{display:flex;flex:1;overflow:hidden;height:100%;}
#chat-sidebar{width:260px;min-width:260px;border-right:1px solid var(--navborder);background:var(--nav);overflow-y:auto;flex-shrink:0;}
.dm-item{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border);}
.dm-item:hover,.dm-item.active{background:var(--accentbg);}
.dm-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:#fff;flex-shrink:0;position:relative;}
.dm-online{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:var(--online);border:2px solid var(--nav);}
.dm-name{font-weight:600;font-size:.87rem;color:var(--text);}
.dm-preview{font-size:.78rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;}
.dm-time{font-size:.72rem;color:var(--text3);margin-left:auto;flex-shrink:0;}
.chat-window{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.chat-header{padding:.75rem 1.25rem;border-bottom:1px solid var(--navborder);display:flex;align-items:center;gap:.75rem;background:var(--nav);flex-shrink:0;}
.chat-messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.5rem;}
.msg-row{display:flex;gap:.5rem;align-items:flex-end;position:relative;}
.msg-row.mine{flex-direction:row-reverse;}
.msg-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff;flex-shrink:0;}
.msg-bubble-wrap{display:flex;flex-direction:column;max-width:65%;}
.msg-row.mine .msg-bubble-wrap{align-items:flex-end;}
.msg-bubble{padding:.55rem .85rem;border-radius:14px;font-size:.88rem;line-height:1.5;background:var(--bg2);color:var(--text);word-break:break-word;position:relative;cursor:default;}
.msg-row.mine .msg-bubble{background:var(--accent);color:#fff;border-radius:14px 14px 4px 14px;}
.msg-row:not(.mine) .msg-bubble{border-radius:4px 14px 14px 14px;}
.msg-time{font-size:.68rem;color:var(--text3);margin-top:.15rem;}
.msg-actions{display:none;position:absolute;top:-28px;background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:.2rem .35rem;gap:.25rem;z-index:10;white-space:nowrap;}
.msg-bubble:hover~.msg-actions,.msg-actions:hover{display:flex;}
.msg-row:hover .msg-actions{display:flex;}
.msg-action-btn{background:transparent;border:none;cursor:pointer;font-size:.72rem;color:var(--text3);padding:.15rem .3rem;border-radius:4px;font-family:'Lato',sans-serif;transition:all .15s;}
.msg-action-btn:hover{background:var(--bg2);color:var(--text);}
.msg-action-btn.del:hover{background:var(--dangerbg);color:var(--danger);}
.msg-tag{font-size:.72rem;color:var(--accent);font-weight:700;margin-bottom:.1rem;padding-left:.1rem;}
.msg-deleted{font-size:.82rem;color:var(--text3);font-style:italic;padding:.4rem .7rem;border-radius:10px;background:var(--bg2);border:1px dashed var(--border);}
.chat-input-row{display:flex;gap:.5rem;padding:.75rem 1rem;border-top:1px solid var(--navborder);background:var(--nav);flex-shrink:0;align-items:center;}
.chat-inp{flex:1;padding:.6rem .9rem;border-radius:20px;border:1px solid var(--inputborder);background:var(--input);color:var(--text);font-family:'Lato',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;}
.chat-inp:focus{border-color:var(--accent);}
.send-btn{width:38px;height:38px;border-radius:50%;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.send-btn:hover{opacity:.9;}
.tag-hint{font-size:.75rem;color:var(--accent);padding:.2rem .5rem;background:var(--accentbg);border-radius:4px;margin-bottom:.25rem;display:none;}

/* ===== COMMUNITY CHAT PAGE ===== */
#community-page{display:none;position:fixed;inset:0;background:var(--bg);z-index:500;flex-direction:column;}
#community-page.visible{display:flex;}
.community-header{display:flex;align-items:center;gap:.75rem;padding:1rem 1.5rem;background:var(--nav);border-bottom:1px solid var(--navborder);flex-shrink:0;}
.community-title{font-family:'Cinzel',serif;font-size:1.2rem;color:var(--accent);}
.community-sub{font-size:.78rem;color:var(--text3);}
.back-btn{background:transparent;border:1px solid var(--border2);border-radius:8px;padding:.4rem .8rem;cursor:pointer;color:var(--text2);font-family:'Lato',sans-serif;font-size:.85rem;display:flex;align-items:center;gap:.35rem;transition:all .2s;margin-right:auto;}
.back-btn:hover{background:var(--bg2);color:var(--text);}
.community-messages{flex:1;overflow-y:auto;padding:1rem 1.5rem;display:flex;flex-direction:column;gap:.6rem;max-width:780px;margin:0 auto;width:100%;}
.community-input-area{padding:.75rem 1.5rem;border-top:1px solid var(--navborder);background:var(--nav);flex-shrink:0;}
.community-input-row{display:flex;gap:.5rem;max-width:780px;margin:0 auto;align-items:flex-end;}
.community-inp{flex:1;padding:.65rem 1rem;border-radius:20px;border:1px solid var(--inputborder);background:var(--input);color:var(--text);font-family:'Lato',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;resize:none;max-height:100px;}
.community-inp:focus{border-color:var(--accent);}

/* ===== PROJECTS ===== */
.project-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:1rem;display:flex;transition:box-shadow .2s;position:relative;}
.project-card:hover{box-shadow:0 4px 24px var(--shadow);}
.project-banner{width:110px;min-height:90px;object-fit:cover;flex-shrink:0;}
.project-banner-placeholder{width:110px;min-height:90px;background:linear-gradient(135deg,var(--bg2),var(--bg3));display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;}
.project-info{flex:1;padding:.85rem 1rem;min-width:0;}
.project-name{font-weight:700;font-size:.95rem;color:var(--text);}
.project-desc{font-size:.82rem;color:var(--text2);margin:.2rem 0 .6rem;}
.project-meta{display:flex;align-items:center;gap:.5rem;font-size:.78rem;color:var(--text3);flex-wrap:wrap;}
.join-btn{padding:.4rem .9rem;border-radius:20px;background:var(--accent);border:none;color:#fff;font-family:'Lato',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .2s;}
.join-btn:hover{opacity:.9;}
.project-actions{display:flex;gap:.5rem;margin-top:.6rem;flex-wrap:wrap;}

/* ===== PROFILE ===== */
.profile-header{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1rem;text-align:center;}
.profile-av-lg{width:72px;height:72px;border-radius:50%;margin:0 auto .75rem;display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:700;color:#fff;}
.profile-name{font-family:'Cinzel',serif;font-size:1.2rem;color:var(--text);}
.profile-bio{font-size:.85rem;color:var(--text2);margin:.4rem 0 .75rem;}
.profile-stats{display:flex;justify-content:center;gap:2rem;}
.pstat{text-align:center;}
.pstat-num{font-size:1.1rem;font-weight:700;color:var(--text);}
.pstat-label{font-size:.75rem;color:var(--text3);}
.edit-btn{margin-top:.9rem;padding:.45rem 1.2rem;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:'Lato',sans-serif;font-size:.85rem;transition:all .2s;}
.edit-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}

/* ===== SETTINGS ===== */
.settings-section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.2rem;margin-bottom:1rem;}
.settings-title{font-weight:700;font-size:.95rem;color:var(--text);margin-bottom:.85rem;font-family:'Cinzel',serif;}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--border);gap:.5rem;}
.setting-row:last-child{border-bottom:none;}
.setting-label{font-size:.88rem;color:var(--text);}
.setting-sub{font-size:.75rem;color:var(--text3);}
.theme-btns{display:flex;gap:.4rem;flex-wrap:wrap;}
.theme-btn{padding:.3rem .7rem;border-radius:20px;font-size:.77rem;cursor:pointer;border:1.5px solid var(--border2);background:transparent;color:var(--text2);font-family:'Lato',sans-serif;transition:all .2s;}
.theme-btn:hover,.theme-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:800;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px);}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:1.5rem;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--accent);margin-bottom:1.2rem;}
.form-group{margin-bottom:1rem;}
.form-label{display:block;font-size:.83rem;color:var(--text2);margin-bottom:.35rem;font-weight:600;}
.form-input{width:100%;padding:.6rem .9rem;border-radius:10px;border:1px solid var(--inputborder);background:var(--input);color:var(--text);font-family:'Lato',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--accent);}
.form-select{width:100%;padding:.6rem .9rem;border-radius:10px;border:1px solid var(--inputborder);background:var(--input);color:var(--text);font-family:'Lato',sans-serif;font-size:.9rem;outline:none;cursor:pointer;}
.form-textarea{width:100%;padding:.6rem .9rem;border-radius:10px;border:1px solid var(--inputborder);background:var(--input);color:var(--text);font-family:'Lato',sans-serif;font-size:.9rem;outline:none;resize:vertical;min-height:80px;transition:border-color .2s;}
.form-textarea:focus{border-color:var(--accent);}
.modal-actions{display:flex;gap:.5rem;justify-content:flex-end;margin-top:1.25rem;}
.btn-primary{padding:.6rem 1.4rem;border-radius:10px;background:var(--accent);border:none;color:#fff;font-family:'Lato',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .2s;}
.btn-primary:hover{opacity:.9;}
.btn-cancel{padding:.6rem 1.2rem;border-radius:10px;background:transparent;border:1px solid var(--border2);color:var(--text2);font-family:'Lato',sans-serif;font-size:.9rem;cursor:pointer;transition:all .2s;}
.btn-cancel:hover{background:var(--bg2);}
.opt-list{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.5rem;}
.opt-input-row{display:flex;gap:.4rem;align-items:center;}
.opt-inp{flex:1;padding:.5rem .75rem;border-radius:8px;border:1px solid var(--inputborder);background:var(--input);color:var(--text);font-family:'Lato',sans-serif;font-size:.88rem;outline:none;}
.opt-inp:focus{border-color:var(--accent);}
.rm-opt{background:transparent;border:none;cursor:pointer;color:var(--text3);font-size:1rem;padding:.25rem;}
.rm-opt:hover{color:var(--danger);}
.add-opt{font-size:.82rem;color:var(--accent);background:transparent;border:none;cursor:pointer;font-family:'Lato',sans-serif;padding:.25rem 0;}

/* ===== MISC ===== */
.tag{display:inline-block;padding:.2rem .55rem;border-radius:20px;font-size:.73rem;background:var(--pill);color:var(--pilltext);font-weight:600;margin:.15rem;}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text3);}
.empty-state h3{font-size:1rem;color:var(--text2);margin-bottom:.4rem;}
.empty-state p{font-size:.84rem;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.section-h{font-family:'Cinzel',serif;font-size:1.05rem;color:var(--text);}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:.75rem 1.25rem;background:var(--text);color:var(--bg);border-radius:12px;font-size:.88rem;z-index:9999;opacity:0;transition:opacity .3s;max-width:320px;pointer-events:none;text-align:center;}
#toast.show{opacity:1;}
.ember-chat-tag{background:var(--accent);color:#fff;font-size:.72rem;font-weight:700;padding:.15rem .5rem;border-radius:20px;margin-left:.5rem;letter-spacing:.04em;}

/* ===== MOBILE NAV ===== */
#mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--nav);border-top:1px solid var(--navborder);z-index:100;padding:.4rem 0 calc(.4rem + env(safe-area-inset-bottom));}
.mob-nav-items{display:flex;justify-content:space-around;}
.mob-nav-item{display:flex;flex-direction:column;align-items:center;gap:.15rem;padding:.35rem .4rem;cursor:pointer;color:var(--text3);transition:color .2s;border:none;background:transparent;flex:1;}
.mob-nav-item.active,.mob-nav-item:hover{color:var(--accent);}
.mob-nav-item svg{width:20px;height:20px;}
.mob-nav-label{font-size:.6rem;font-family:'Lato',sans-serif;}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  #sidebar{display:none;}
  #mobile-nav{display:block;}
  #app{flex-direction:column;}
  #main{height:calc(100vh - 58px);}
  #content{padding:.75rem;}
  #fab-btn{bottom:72px;right:16px;}
  #chat-sidebar{
    width:100%;min-width:0;border-right:none;
    border-bottom:1px solid var(--navborder);
    max-height:40vh;
  }
  .chat-layout{flex-direction:column;}
  .chat-window{height:60vh;}
  .project-card{flex-direction:column;}
  .project-banner,.project-banner-placeholder{width:100%;height:120px;}
  .community-header{padding:.75rem 1rem;}
  .community-messages{padding:.75rem 1rem;}
  .community-input-area{padding:.5rem 1rem;}
  .modal{border-radius:16px;}
  .profile-stats{gap:1rem;}
}
@media(max-width:480px){
  .post-footer{gap:.25rem;}
  .post-action{font-size:.78rem;padding:.25rem .4rem;}
  .dm-preview{max-width:100px;}
}

<script>
/* ===== STATE ===== */
let state = {
  theme: 'light-amber',
  user: null,
  currentPage: 'feed',
  currentDM: null,
  posts: [],
  polls: [],
  projects: [],
  dms: {},
  communityMessages: [],
  projectChats: {},
  users: {},
};

let _emberIntroShown = false;

const SAMPLE_USERS = [
  {id:'u1',name:'Lyra Voss',bio:'Dreamer and creator 🌙',isGuest:false},
  {id:'u2',name:'Caelum',bio:'Building worlds one pixel at a time',isGuest:false},

];

function initSampleData(){

  state.posts = [
    {id:'p1',uid:'u1',text:'Just finished a new illustration series inspired by dusk light. Soft ambers and deep blues — something about that liminal hour feels magical. ✨',title:'Dusk Series',mediaUrl:'',mediaType:'image',time:Date.now()-3600000*2,likes:[],comments:[]},
    {id:'p2',uid:'u2',text:'Working on an open-source project for collaborative worldbuilding. Drop a ⚡ if you want early access!',title:'Open Source Worldbuilding',mediaUrl:'',mediaType:'image',time:Date.now()-3600000*5,likes:[],comments:[]},
    {id:'p3',uid:'u3',text:'Hot take: afternoon coffee tastes better when you\'re procrastinating. ☕ Change my mind.',title:'Afternoon Thoughts',mediaUrl:'',mediaType:'image',time:Date.now()-3600000*18,likes:[],comments:[]},

  state.polls = [

    {id:'pl2',uid:'u2',category:'Sports',question:'Best sport for building mental resilience?',sub:'Inspired by some reading I did this week',options:['Swimming','Rock climbing','Martial arts','Long-distance running'],votes:{},time:Date.now()-3600000*9},
  ];
  state.polls[0].votes = {u1:'Morning',u2:'Evening',u3:'Late night'};
  state.polls[1].votes = {u1:'Rock climbing',u3:'Swimming'};
  state.projects = [

  ];
  state.dms = {

  };
  state.communityMessages = [
    {id:'cm1',uid:'u1',text:'Welcome everyone to Ember Chat! 🔥',time:Date.now()-3600000*24,deleted:false,replyTo:null},
    {id:'cm2',uid:'u3',text:'This place feels cosy already ✨',time:Date.now()-3600000*20,deleted:false,replyTo:null},
    {id:'cm3',uid:'u2',text:'Glad to see the community growing!',time:Date.now()-3600000*8,deleted:false,replyTo:null},
    {id:'cm4',uid:'u4',text:'Anyone up for a collab?',time:Date.now()-3600000*2,deleted:false,replyTo:null},
  ];
  state.projectChats = {
    pr1:[{id:'pc1',uid:'u2',text:'Pixel Atlas is live! Drop your first tile idea',time:Date.now()-3600000*11,deleted:false}],

  };
  saveState();
}

/* ===== STORAGE ===== */
function ls(k,v){if(v===undefined){try{return JSON.parse(localStorage.getItem(k));}catch{return null;}}localStorage.setItem(k,JSON.stringify(v));}
function saveState(){ls('ember_data2',state);}

/* ===== THEME ===== */
function setTheme(t,el){
  state.theme=t;
  document.body.setAttribute('data-theme',t);
  document.querySelectorAll('.theme-btn').forEach(e=>e.classList.remove('active'));
  if(el)el.classList.add('active');
  saveState();
}

/* ===== AUTH ===== */
function staticGoogle(){showToast('Google login coming soon! Try Guest for now.');}
function joinAsGuest(){
  state.user={id:'guest_'+Math.random().toString(36).slice(2,7),name:'Guest',bio:'',isGuest:true};
  enterApp();
}
function enterApp(){
  document.getElementById('auth-page').style.display='none';
  document.getElementById('app').classList.add('visible');
  updateSidebarUser();
  navigate('feed');
}
function updateSidebarUser(){
  const u=state.user;if(!u)return;
  const n=u.name||'Guest';
  document.getElementById('sidebar-av').textContent=n.charAt(0).toUpperCase();
  document.getElementById('sidebar-username').textContent=n;
  document.getElementById('sidebar-tag').textContent=u.isGuest?'guest account':'@'+n.toLowerCase().replace(/\s+/g,'_');
}

/* ===== NAVIGATION ===== */
function navigate(page){
  state.currentPage=page;

  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  const ni=document.getElementById('nav-'+page);if(ni)ni.classList.add('active');
  document.querySelectorAll('.mob-nav-item').forEach(e=>e.classList.remove('active'));
  const mi=document.getElementById('mob-nav-'+page);if(mi)mi.classList.add('active');

  const titles={feed:'Feed',chats:'Chats',polls:'Polls',projects:'Projects',profile:'Profile',settings:'Settings',ember:'Ember AI'};
  document.getElementById('topbar-title').textContent=titles[page]||page;

  const hpBtn=document.getElementById('host-project-btn');
  if(hpBtn) hpBtn.classList.toggle('visible', page==='projects');

  const fab=document.getElementById('fab-btn');
  const showFab=['feed','polls','chats'].includes(page);
  if(showFab){
    fab.classList.add('visible');
    if(page==='chats'){

  if(page !== 'ember'){

    if(emberWrap) emberWrap.remove();
  }

  const content=document.getElementById('content');
  if(page !== 'ember'){
    content.style.cssText='';
  }

  const cl=document.getElementById('chat-layout-wrap');
  if(cl && page!=='chats') cl.remove();

  switch(page){
    case 'feed': renderFeed(); break;
    case 'chats': renderChats(); break;
    case 'polls': renderPolls(); break;
    case 'projects': renderProjects(); break;
    case 'profile': renderProfile(state.user?.id||'me'); break;

    case 'ember': renderEmber(); break;

}

/* ===== FIX: emberSuggest now correctly calls sendEmber() ===== */
function emberSuggest(btn) {
  const inp = document.getElementById('ember-ai-inp');
  if (inp) {
    inp.value = btn.textContent;
    inp.style.height = 'auto';
    inp.style.height = Math.min(inp.scrollHeight, 110) + 'px';
    sendEmber(); // FIXED: was sendEmberMsg()
  }
}

const _emberHistory = [];

/* ===== sendEmber — the one true send function ===== */
async function sendEmber() {
  const inp = document.getElementById('ember-ai-inp');
  const msgs = document.getElementById('ember-msgs');
  if (!inp || !msgs) return;

  const text = inp.value.trim();
  if (!text) return;

  // Disable input while waiting
  inp.disabled = true;
  document.getElementById('ember-send-btn').disabled = true;

  // Hide welcome screen
  const welcome = document.getElementById('ember-welcome');
  if (welcome) welcome.remove();

  // User bubble
  const userEl = document.createElement('div');
  userEl.className = 'em-row em-mine';
  const userInitialChar = (state.user?.name || 'G').charAt(0).toUpperCase();
  userEl.innerHTML = `
    <div class="em-av em-av-user">${userInitialChar}</div>
    <div class="em-body">
      <div class="em-sender">You</div>
      <div class="em-bubble">${escHtml(text)}</div>
    </div>`;
  msgs.appendChild(userEl);

  inp.value = '';
  inp.style.height = 'auto';
  scrollToBottom('ember-msgs');

  _emberHistory.push({ role: 'user', content: text });

  // Typing indicator
  const typingEl = document.createElement('div');
  typingEl.className = 'em-row';
  typingEl.id = 'ember-typing';
  typingEl.innerHTML = `
    <div class="em-av em-av-ai"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.827 16.379a6.082 6.082 0 0 1-8.618-7.002l5.412 1.45a6.082 6.082 0 0 1 7.002-8.618l-1.45 5.412a6.082 6.082 0 0 1 8.618 7.002l-5.412-1.45a6.082 6.082 0 0 1-7.002 8.618l1.45-5.412Z"/><path d="M12 12v.01"/></svg></div>
    <div class="em-body">
      <div class="em-sender">Ember</div>
      <div class="em-bubble"><div class="em-typing"><span></span><span></span><span></span></div></div>
    </div>`;
  msgs.appendChild(typingEl);
  scrollToBottom('ember-msgs');

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();
    const reply = data.reply || 'Something went wrong.';

    _emberHistory.push({ role: 'assistant', content: reply });

    const t = document.getElementById('ember-typing');
    if (t) t.remove();

    const aiEl = document.createElement('div');
    aiEl.className = 'em-row';
    aiEl.innerHTML = `
      <div class="em-av em-av-ai"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.827 16.379a6.082 6.082 0 0 1-8.618-7.002l5.412 1.45a6.082 6.082 0 0 1 7.002-8.618l-1.45 5.412a6.082 6.082 0 0 1 8.618 7.002l-5.412-1.45a6.082 6.082 0 0 1-7.002 8.618l1.45-5.412Z"/><path d="M12 12v.01"/></svg></div>
      <div class="em-body">
        <div class="em-sender">Ember</div>
        <div class="em-bubble">${emberFormat(reply)}</div>
      </div>`;
    msgs.appendChild(aiEl);

  } catch (err) {
    const t = document.getElementById('ember-typing');
    if (t) t.remove();

    const errEl = document.createElement('div');
    errEl.className = 'em-row';
    errEl.innerHTML = `
      <div class="em-av em-av-ai"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.827 16.379a6.082 6.082 0 0 1-8.618-7.002l5.412 1.45a6.082 6.082 0 0 1 7.002-8.618l-1.45 5.412a6.082 6.082 0 0 1 8.618 7.002l-5.412-1.45a6.082 6.082 0 0 1-7.002 8.618l1.45-5.412Z"/><path d="M12 12v.01"/></svg></div>
      <div class="em-body">
        <div class="em-sender">Ember</div>
        <div class="em-bubble" style="color:var(--danger)">Couldn't reach Ember right now. Check your connection or API route.</div>
      </div>`;
    msgs.appendChild(errEl);
  } finally {
    // Re-enable input
    inp.disabled = false;
    document.getElementById('ember-send-btn').disabled = false;
    inp.focus();
  }

  scrollToBottom('ember-msgs');
}

function emberFormat(t) {
  t = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t = t.replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre>$1</pre>');
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  t = t.replace(/\n/g, '<br>');
  return t;
}

  else if(p==='polls') showPollModal();

}

/* ===== HELPERS ===== */
function timeAgo(ts){
  const d=(Date.now()-ts)/1000;
  if(d<60)return 'just now';
  if(d<3600)return Math.floor(d/60)+'m ago';
  if(d<86400)return Math.floor(d/3600)+'h ago';
  return Math.floor(d/86400)+'d ago';
}
function userName(uid2){
  if(!uid2)return 'Unknown';
  if(uid2==='me'||uid2===state.user?.id)return state.user?.name||'Guest';
  return state.users[uid2]?.name||'User';
}
function userInitial(uid2){return userName(uid2).charAt(0).toUpperCase();}
const AV_COLORS=['#D67933','#2772A3','#7B68EE','#5CBBAA','#D4789A','#E8924A','#4A9DCE'];
function avColor(uid2){if(!uid2)return AV_COLORS[0];let h=0;for(let i=0;i<uid2.length;i++)h+=uid2.charCodeAt(i);return AV_COLORS[h%AV_COLORS.length];}
function avStyle(uid2){return `background:${avColor(uid2)}`;}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function allUserNames(){
  const names=[];
  Object.values(state.users).forEach(u=>names.push(u.name));
  if(state.user)names.push(state.user.name);
  return names;
}

/* ===== FEED ===== */
function renderFeed(){
  const c=document.getElementById('content');
  if(!state.posts.length){
    c.innerHTML=`<div class="empty-state"><h3>Nothing here yet</h3><p>Be the first to post something ✨</p></div>`;return;
  }
  c.innerHTML=state.posts.map(p=>postHTML(p)).join('');
}
function postHTML(p){
  const me=state.user?.id||'guest';
  const liked=p.likes&&p.likes.includes(me);
  const isMine=p.uid===me;
  let mediaEl='';
  if(p.mediaUrl){
    if(p.mediaType==='video'){
      mediaEl=`<video class="post-media-video" src="${p.mediaUrl}" controls></video>`;
    } else {
      mediaEl=`<img class="post-media" src="${p.mediaUrl}" alt="post image" loading="lazy"/>`;
    }
  } else {
    mediaEl=`<div style="width:100%;height:160px;background:linear-gradient(135deg,var(--bg2),var(--bg3));display:flex;align-items:center;justify-content:center;font-size:2rem;opacity:.6;">🖼️</div>`;
  }
  return `<div class="post-card" id="post-${p.id}">
    ${isMine?`<button class="post-delete-btn" onclick="deletePost('${p.id}')" title="Delete post">✕</button>`:''}
    <div class="post-header">
      <div class="post-av" style="${avStyle(p.uid)}" onclick="viewProfile('${p.uid}')">${userInitial(p.uid)}</div>
      <div>
        <div class="post-username" onclick="viewProfile('${p.uid}')">${userName(p.uid)}</div>
        <div class="post-time">${timeAgo(p.time)}</div>
      </div>
    </div>
    ${mediaEl}
    ${p.title?`<div class="post-title">${escHtml(p.title)}</div>`:''}
    <div class="post-body">${escHtml(p.text)}</div>
    <div class="post-footer">
      <button class="post-action ${liked?'liked':''}" onclick="toggleLike('${p.id}')">
        <svg width="15" height="15" fill="${liked?'currentColor':'none'}" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        ${p.likes?p.likes.length:0}
      </button>
      <button class="post-action">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Comment
      </button>
      ${isMine?`<button class="post-action danger" onclick="deletePost('${p.id}')">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        Delete
      </button>`:''}
    </div>
  </div>`;
}
function escHtml(s){if(!s)return '';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toggleLike(pid){
  const me=state.user?.id||'guest';
  const p=state.posts.find(x=>x.id===pid);if(!p)return;
  if(!p.likes)p.likes=[];
  const idx=p.likes.indexOf(me);
  if(idx===-1)p.likes.push(me);else p.likes.splice(idx,1);
  saveState();renderFeed();
}
function deletePost(pid){
  if(!confirm('Delete this post?'))return;
  const me=state.user?.id||'guest';
  const idx=state.posts.findIndex(x=>x.id===pid);
  if(idx===-1)return;
  if(state.posts[idx].uid!==me)return showToast('Not your post.');
  state.posts.splice(idx,1);
  saveState();renderFeed();showToast('Post deleted.');
}
function viewProfile(uid2){navigate('profile');setTimeout(()=>renderProfile(uid2),10);}

/* ===== POST MODAL ===== */
let _postMediaData=null,_postMediaType=null;

function showPostModal(){
  _postMediaData=null;_postMediaType=null;
  makeModal('Share a Post');
  document.getElementById('modal-body').innerHTML+=`
    <div class="form-group">
      <label class="form-label">Media <span style="color:var(--danger);font-weight:700;">*required</span></label>
      <div class="media-upload-box" id="upload-box">
        <input type="file" accept="image/png,image/jpeg,image/jpg,video/mp4,video/webm,video/ogg" onchange="handlePostMedia(event)" id="media-file-input"/>
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <path d="M3 16l5-5 4 4 3-3 6 6"/>
          <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" stroke="none"/>
        </svg>
        <span>Upload Media</span>
        <small>JPG, PNG or MP4 · click to browse</small>
        <div id="upload-thumb-wrap"></div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Post Title</label>
      <input class="form-input" id="post-title" placeholder="Give your post a title…"/>
    </div>
    <div class="form-group">
      <label class="form-label">Caption</label>
      <textarea class="form-textarea" id="post-text" placeholder="Write something…" style="min-height:64px;"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="submitPost()">Post ✨</button>
    </div>`;
}

function handlePostMedia(e){
  const file=e.target.files[0];if(!file)return;
  const isVideo=file.type.startsWith('video/');
  _postMediaType=isVideo?'video':'image';
  const reader=new FileReader();
  reader.onload=ev=>{
    _postMediaData=ev.target.result;
    const box=document.getElementById('upload-box');
    const wrap=document.getElementById('upload-thumb-wrap');
    if(box) box.classList.add('has-media');
    const icon=box.querySelector('svg');
    const span=box.querySelector('span');
    const small=box.querySelector('small');
    if(icon) icon.style.display='none';
    if(span) span.style.display='none';
    if(small) small.style.display='none';
    if(wrap){
      if(isVideo){
        wrap.innerHTML=`<video class="upload-thumb-video" src="${_postMediaData}" muted playsinline></video><div class="upload-thumb-overlay"><span>Change video</span></div>`;
      } else {
        wrap.innerHTML=`<img class="upload-thumb" src="${_postMediaData}" alt="preview"/><div class="upload-thumb-overlay"><span>Change photo</span></div>`;
      }
    }
  };
  reader.readAsDataURL(file);
}

function submitPost(){
  const txt=document.getElementById('post-text')?.value?.trim();
  const title=document.getElementById('post-title')?.value?.trim();
  if(!_postMediaData)return showToast('Please upload an image or video first.');
  const uid2=state.user?.id||'guest';
  state.posts.unshift({
    id:'p'+Date.now(),uid:uid2,
    text:txt||'',title:title||'',
    mediaUrl:_postMediaData,mediaType:_postMediaType,
    time:Date.now(),likes:[],comments:[]
  });
  saveState();closeModal();navigate('feed');showToast('Posted! ✨');
}

  wrap.style.overflow='hidden';

  cWin.className='chat-window';
  cWin.id='chat-window';
  cWin.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:.75rem;">

  </div>`;

function openDM(uid2){
  state.currentDM=uid2;
  if(!state.dms[uid2])state.dms[uid2]=[];
  const u=state.users[uid2];
  const cWin=document.getElementById('chat-window');if(!cWin)return;
  document.querySelectorAll('.dm-item').forEach(e=>e.classList.remove('active'));
  const di=document.getElementById('dm-'+uid2);if(di)di.classList.add('active');
  document.getElementById('topbar-title').textContent=u?.name||'Chat';

  cWin.innerHTML=`
    <div class="chat-header">
      <div class="dm-av" style="${avStyle(uid2)};width:34px;height:34px;">${u?.name?.charAt(0)||'?'}</div>
      <div>
        <div style="font-weight:700;font-size:.9rem;">${u?.name||'User'}</div>
        <div style="font-size:.75rem;color:var(--online);">● online</div>
      </div>
    </div>
    <div class="chat-messages" id="dm-msgs">${renderDMMessages(uid2)}</div>
    <div class="chat-input-row">
      <input class="chat-inp" id="dm-inp" placeholder="Message ${u?.name||''}... type @ to tag" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendDM('${uid2}');}"/>
      <button class="send-btn" onclick="sendDM('${uid2}')">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>`;
  scrollToBottom('dm-msgs');
}

function renderDMMessages(uid2){
  const msgs=state.dms[uid2]||[];
  return msgs.map((m,i)=>dmMsgHTML(m,uid2,i)).join('');
}
function dmMsgHTML(m,uid2,i){
  const me=state.user?.id||'guest';
  const isMine=(m.from==='me'||m.from===me);
  if(m.deleted){
    return `<div class="msg-row ${isMine?'mine':''}">
      <div class="msg-deleted">Message deleted</div>
    </div>`;
  }
  const name=isMine?(state.user?.name||'You'):userName(uid2);
  const avU=isMine?me:uid2;
  return `<div class="msg-row ${isMine?'mine':''}" id="dmm-${m.id}">
    ${!isMine?`<div class="msg-av" style="${avStyle(avU)}">${userInitial(avU)}</div>`:''}
    <div class="msg-bubble-wrap">
      <div class="msg-bubble" onmouseenter="showMsgActions('dma-${m.id}')" onmouseleave="hideMsgActions('dma-${m.id}')">${escHtml(m.text)}</div>
      <div class="msg-actions" id="dma-${m.id}" onmouseenter="showMsgActions('dma-${m.id}')" onmouseleave="hideMsgActions('dma-${m.id}')">
        <button class="msg-action-btn" onclick="tagUserInDM('${uid2}','${escHtml(name)}')">@ Tag</button>
        ${isMine?`<button class="msg-action-btn del" onclick="deleteDMMsg('${uid2}','${m.id}')">Delete</button>`:''}
      </div>
      <div class="msg-time">${timeAgo(m.time)}</div>
    </div>
  </div>`;
}
function showMsgActions(id){const el=document.getElementById(id);if(el)el.style.display='flex';}
function hideMsgActions(id){const el=document.getElementById(id);if(el)el.style.display='';}

function tagUserInDM(uid2,name){
  const inp=document.getElementById('dm-inp');
  if(inp){inp.value=(inp.value+' @'+name+' ').trimStart();inp.focus();}
}
function deleteDMMsg(uid2,msgId){
  if(!confirm('Delete this message?'))return;
  const msgs=state.dms[uid2]||[];
  const m=msgs.find(x=>x.id===msgId);
  if(m){m.deleted=true;saveState();
    const el=document.getElementById('dmm-'+msgId);
    if(el)el.outerHTML=`<div class="msg-row mine"><div class="msg-deleted">Message deleted</div></div>`;
  }
}

function sendDM(uid2){
  const inp=document.getElementById('dm-inp');
  const txt=inp?.value?.trim();if(!txt)return;
  if(!state.dms[uid2])state.dms[uid2]=[];
  const msgId='dm'+uid();
  state.dms[uid2].push({id:msgId,from:'me',text:txt,time:Date.now(),deleted:false});
  saveState();inp.value='';
  const c=document.getElementById('dm-msgs');
  if(c){c.innerHTML=renderDMMessages(uid2);scrollToBottom('dm-msgs');}
  setTimeout(()=>{
    const replies=['Sounds great!','Interesting! Tell me more.','Ha, totally! 😄','🔥','That makes sense!','Wow, really?'];
    state.dms[uid2].push({id:'dm'+uid(),from:uid2,text:replies[Math.floor(Math.random()*replies.length)],time:Date.now(),deleted:false});
    saveState();
    const c2=document.getElementById('dm-msgs');
    if(c2){c2.innerHTML=renderDMMessages(uid2);scrollToBottom('dm-msgs');}
  },1000+Math.random()*1500);
}

function tagInCommunity(name){
  const inp=document.getElementById('community-inp');
  if(inp){inp.value=(inp.value+' @'+name+' ').trimStart();inp.focus();}
}
function deleteCommunityMsg(msgId){
  if(!confirm('Delete this message?'))return;
  const m=state.communityMessages.find(x=>x.id===msgId);
  if(m){m.deleted=true;saveState();renderCommunityMessages();scrollToBottom('community-msgs');}
}
function sendCommunity(){
  const inp=document.getElementById('community-inp');
  const txt=inp?.value?.trim();if(!txt)return;
  const myUid=state.user?.id||'guest';
  state.communityMessages.push({id:'cm'+uid(),uid:myUid,text:txt,time:Date.now(),deleted:false,replyTo:null});
  saveState();inp.value='';inp.style.height='auto';
  renderCommunityMessages();scrollToBottom('community-msgs');
}
function commKeydown(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendCommunity();}
}
function commInput(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,100)+'px';
  const val=el.value;
  const atIdx=val.lastIndexOf('@');
  const hint=document.getElementById('tag-hint');
  if(atIdx!==-1&&atIdx===val.length-1||(atIdx!==-1&&!val.slice(atIdx+1).includes(' ')&&val.slice(atIdx+1).length>0)){
    const query=val.slice(atIdx+1).toLowerCase();
    const matches=allUserNames().filter(n=>n.toLowerCase().startsWith(query)&&query.length>0);
    if(matches.length){
      hint.style.display='block';
      hint.innerHTML=matches.slice(0,3).map(n=>`<span onclick="insertTag('${n}')" style="cursor:pointer;margin-right:.5rem;">@${n}</span>`).join('');
    } else {hint.style.display='none';}
  } else {hint.style.display='none';}
}
function insertTag(name){
  const inp=document.getElementById('community-inp');
  if(!inp)return;
  const val=inp.value;
  const atIdx=val.lastIndexOf('@');
  inp.value=val.slice(0,atIdx)+'@'+name+' ';
  document.getElementById('tag-hint').style.display='none';
  inp.focus();
}

/* ===== POLLS ===== */
function renderPolls(){
  const c=document.getElementById('content');
  if(!state.polls.length){c.innerHTML=`<div class="empty-state"><h3>No polls yet</h3><p>Create one using the + button!</p></div>`;return;}
  c.innerHTML=state.polls.map(p=>pollHTML(p)).join('');
}
function pollHTML(p){
  const me=state.user?.id||'guest';
  const myVote=p.votes[me];
  const total=Object.values(p.votes).length;
  const isMine=p.uid===me;
  const opts=p.options.map(opt=>{
    const cnt=Object.values(p.votes).filter(v=>v===opt).length;
    const pct=total?Math.round(cnt/total*100):0;
    return `<button class="poll-opt ${myVote===opt?'voted':''}" onclick="vote('${p.id}','${opt.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">
      <div class="poll-bar" style="width:${myVote?pct:0}%"></div>
      <span style="position:relative">${escHtml(opt)}</span>
      ${myVote?`<span class="poll-pct">${pct}%</span>`:''}
    </button>`;
  }).join('');
  return `<div class="poll-card">
    ${isMine?`<button class="poll-delete-btn" onclick="deletePoll('${p.id}')" title="Delete poll">✕</button>`:''}
    <div class="poll-category">${escHtml(p.category)}</div>
    <div class="poll-q">${escHtml(p.question)}</div>
    <div class="poll-sub">${escHtml(p.sub)}</div>
    ${opts}
    <div class="poll-meta">
      <strong style="color:var(--text)">${userName(p.uid)}</strong> · ${total} vote${total!==1?'s':''} · ${timeAgo(p.time)}
    </div>
  </div>`;
}
function vote(pid,opt){
  const me=state.user?.id||'guest';
  const p=state.polls.find(x=>x.id===pid);if(!p)return;
  if(p.votes[me]===opt)delete p.votes[me];else p.votes[me]=opt;
  saveState();renderPolls();
}
function deletePoll(pid){
  if(!confirm('Delete this poll?'))return;
  const me=state.user?.id||'guest';
  const idx=state.polls.findIndex(x=>x.id===pid);
  if(idx===-1)return;
  if(state.polls[idx].uid!==me)return showToast('Not your poll.');
  state.polls.splice(idx,1);saveState();renderPolls();showToast('Poll deleted.');
}

function addOpt(){
  const l=document.getElementById('opt-list');
  const n=document.createElement('div');n.className='opt-input-row';
  n.innerHTML=`<input class="opt-inp" placeholder="Option ${l.children.length+1}"/><button class="rm-opt" onclick="rmOpt(this)">✕</button>`;

}
function rmOpt(btn){
  if(document.getElementById('opt-list').children.length>2)btn.parentElement.remove();
  else showToast('Need at least 2 options.');
}
function submitPoll(){
  const q=document.getElementById('poll-q')?.value?.trim();
  const sub=document.getElementById('poll-sub')?.value?.trim();
  const cat=document.getElementById('poll-cat')?.value;
  const opts=[...document.querySelectorAll('.opt-inp')].map(e=>e.value.trim()).filter(Boolean);
  if(!q)return showToast('Please add a question.');
  if(opts.length<2)return showToast('Need at least 2 options.');
  state.polls.unshift({id:'pl'+Date.now(),uid:state.user?.id||'guest',category:cat||'General',question:q,sub:sub||'',options:opts,votes:{},time:Date.now()});
  saveState();closeModal();navigate('polls');showToast('Poll created! 📊');
}

/* ===== PROJECTS ===== */
function renderProjects(){
  const c=document.getElementById('content');
  let html=`<div class="section-header"><div class="section-h">Active Projects</div></div>`;
  if(!state.projects.length){html+=`<div class="empty-state"><h3>No projects yet</h3><p>Use the Host Project button to create one!</p></div>`;}
  else html+=state.projects.map(p=>projectHTML(p)).join('');
  c.innerHTML=html;
}
function projectHTML(p){
  const me=state.user?.id||'guest';
  const joined=p.members.includes(me)||p.uid===me;
  const isMine=p.uid===me;
  const full=p.max!=='unlimited'&&p.members.length>=parseInt(p.max);
  return `<div class="project-card">
    <div class="project-banner-placeholder">🗺️</div>
    <div class="project-info">
      <div class="project-name">${escHtml(p.name)}</div>
      <div class="project-desc">${escHtml(p.desc)}</div>
      <div class="project-meta">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        ${p.members.length}${p.max==='unlimited'?'':'/'+p.max} members · by ${userName(p.uid)}
        ${full&&!joined?'<span class="tag" style="margin-left:.25rem">Full</span>':''}
      </div>
      <div class="project-actions">
        ${!joined&&!full?`<button class="join-btn" onclick="joinProject('${p.id}')">Join</button>`:''}
        ${joined?`<button class="join-btn" onclick="openProjectChat('${p.id}')">Open Chat</button>`:''}
        ${isMine?`<button class="join-btn" style="background:transparent;border:1px solid var(--danger);color:var(--danger);" onclick="deleteProject('${p.id}')">Delete</button>`:''}
      </div>
    </div>
  </div>`;
}
function joinProject(pid){
  const me=state.user?.id||'guest';
  const p=state.projects.find(x=>x.id===pid);if(!p)return;
  if(p.members.includes(me))return;
  if(p.max!=='unlimited'&&p.members.length>=parseInt(p.max))return showToast('Project is full.');
  p.members.push(me);
  if(!state.projectChats[pid])state.projectChats[pid]=[];
  state.projectChats[pid].push({id:'pc'+uid(),uid:me,text:`${state.user?.name||'Guest'} joined the project! 👋`,time:Date.now(),deleted:false});
  saveState();renderProjects();showToast('Joined '+p.name+'! 🎉');
}
function deleteProject(pid){
  if(!confirm('Delete this project?'))return;
  const me=state.user?.id||'guest';
  const idx=state.projects.findIndex(x=>x.id===pid);
  if(idx===-1)return;
  if(state.projects[idx].uid!==me)return showToast('Not your project.');
  state.projects.splice(idx,1);
  saveState();renderProjects();showToast('Project deleted.');
}
function openProjectChat(pid){
  const p=state.projects.find(x=>x.id===pid);if(!p)return;
  navigate('chats');
  setTimeout(()=>{
    const cWin=document.getElementById('chat-window');if(!cWin)return;
    document.getElementById('topbar-title').textContent=p.name;
    if(!state.projectChats[pid])state.projectChats[pid]=[];
    cWin.innerHTML=`
      <div class="chat-header">
        <div class="dm-av" style="background:var(--blue);width:34px;height:34px;">P</div>
        <div>
          <div style="font-weight:700;font-size:.9rem;">${escHtml(p.name)}</div>
          <div style="font-size:.75rem;color:var(--text3);">${p.members.length} member${p.members.length!==1?'s':''}</div>
        </div>
      </div>
      <div class="chat-messages" id="proj-msgs">${state.projectChats[pid].map((m,i)=>projMsgHTML(m,pid,i)).join('')}</div>
      <div class="chat-input-row">
        <input class="chat-inp" id="proj-inp" placeholder="Message ${escHtml(p.name)}..." onkeydown="if(event.key==='Enter'){event.preventDefault();sendProjectMsg('${pid}');}"/>
        <button class="send-btn" onclick="sendProjectMsg('${pid}')">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>`;
    scrollToBottom('proj-msgs');
  },60);
}
function projMsgHTML(m,pid,i){
  const me=state.user?.id||'guest';
  const isMine=(m.uid===me);
  if(m.deleted)return `<div class="msg-row ${isMine?'mine':''}"><div class="msg-deleted">Message deleted</div></div>`;
  const name=isMine?(state.user?.name||'You'):userName(m.uid);
  return `<div class="msg-row ${isMine?'mine':''}" id="pm-${m.id}">
    ${!isMine?`<div class="msg-av" style="${avStyle(m.uid)}">${userInitial(m.uid)}</div>`:''}
    <div class="msg-bubble-wrap">
      ${!isMine?`<div style="font-size:.72rem;color:var(--text3);margin-bottom:.1rem;">${name}</div>`:''}
      <div class="msg-bubble" onmouseenter="showMsgActions('pma-${m.id}')" onmouseleave="hideMsgActions('pma-${m.id}')">${escHtml(m.text)}</div>
      <div class="msg-actions" id="pma-${m.id}" onmouseenter="showMsgActions('pma-${m.id}')" onmouseleave="hideMsgActions('pma-${m.id}')">
        <button class="msg-action-btn" onclick="tagInProject('${pid}','${escHtml(name)}')">@ Tag</button>
        ${isMine?`<button class="msg-action-btn del" onclick="deleteProjectMsg('${pid}','${m.id}')">Delete</button>`:''}
      </div>
      <div class="msg-time" style="text-align:${isMine?'right':'left'}">${timeAgo(m.time)}</div>
    </div>
  </div>`;
}
function tagInProject(pid,name){
  const inp=document.getElementById('proj-inp');
  if(inp){inp.value=(inp.value+' @'+name+' ').trimStart();inp.focus();}
}
function deleteProjectMsg(pid,msgId){
  if(!confirm('Delete this message?'))return;
  const msgs=state.projectChats[pid]||[];
  const m=msgs.find(x=>x.id===msgId);
  if(m){m.deleted=true;saveState();
    const el=document.getElementById('pm-'+msgId);
    if(el)el.outerHTML=`<div class="msg-row mine"><div class="msg-deleted">Message deleted</div></div>`;
  }
}
function sendProjectMsg(pid){
  const inp=document.getElementById('proj-inp');
  const txt=inp?.value?.trim();if(!txt)return;
  const myUid=state.user?.id||'guest';
  if(!state.projectChats[pid])state.projectChats[pid]=[];
  const msgId='pc'+uid();
  state.projectChats[pid].push({id:msgId,uid:myUid,text:txt,time:Date.now(),deleted:false});
  saveState();inp.value='';
  const c=document.getElementById('proj-msgs');
  if(c){c.innerHTML=state.projectChats[pid].map((m,i)=>projMsgHTML(m,pid,i)).join('');scrollToBottom('proj-msgs');}
}

/* ===== PROJECT MODAL ===== */
function showProjectModal(){
  const me=state.user?.id||'guest';
  const myProj=state.projects.find(p=>p.uid===me);
  if(myProj)return showToast('You already host a project. Delete it first to create a new one.');
  makeModal('Host a Project');
  document.getElementById('modal-body').innerHTML+=`
    <div class="form-group">
      <label class="form-label">Project Name</label>
      <input class="form-input" id="proj-name" placeholder="My awesome project..."/>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <input class="form-input" id="proj-desc" placeholder="What is this project about?"/>
    </div>
    <div class="form-group">
      <label class="form-label">Max Members</label>
      <select class="form-select" id="proj-max">
        <option value="2">2</option><option value="3">3</option><option value="4">4</option>
        <option value="5" selected>5</option><option value="6">6</option>
        <option value="10">10</option><option value="20">20</option>
        <option value="unlimited">Unlimited</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="submitProject()">Host Project</button>
    </div>`;
}
function submitProject(){
  const name=document.getElementById('proj-name')?.value?.trim();
  const desc=document.getElementById('proj-desc')?.value?.trim();
  const max=document.getElementById('proj-max')?.value;
  if(!name)return showToast('Please add a project name.');
  const me=state.user?.id||'guest';
  const pid='pr'+Date.now();
  state.projects.unshift({id:pid,uid:me,name,desc:desc||'',max,members:[me],time:Date.now()});
  state.projectChats[pid]=[{id:'pc'+uid(),uid:me,text:'Project created! Welcome everyone 🎉',time:Date.now(),deleted:false}];
  saveState();closeModal();renderProjects();showToast('Project hosted! 🚀');
}

/* ===== PROFILE ===== */
function renderProfile(uid2){
  const me=state.user?.id||'guest';
  const isMe=(uid2==='me'||uid2===me);
  const u=isMe?state.user:state.users[uid2];
  if(!u){document.getElementById('content').innerHTML=`<div class="empty-state"><h3>User not found</h3></div>`;return;}
  const myPosts=isMe?state.posts.filter(p=>p.uid===me):state.posts.filter(p=>p.uid===uid2);
  document.getElementById('content').innerHTML=`
    <div class="profile-header">
      <div class="profile-av-lg" style="${avStyle(uid2)}">${(u.name||'G').charAt(0).toUpperCase()}</div>
      <div class="profile-name">${escHtml(u.name||'Guest')}</div>
      <div class="profile-bio">${escHtml(u.bio||'No bio yet.')}</div>
      <div class="profile-stats">
        <div class="pstat"><div class="pstat-num">${myPosts.length}</div><div class="pstat-label">Posts</div></div>
        <div class="pstat"><div class="pstat-num">${u.isGuest?'—':Object.keys(state.users).length}</div><div class="pstat-label">Following</div></div>
        <div class="pstat"><div class="pstat-num">${myPosts.reduce((a,p)=>a+(p.likes?p.likes.length:0),0)}</div><div class="pstat-label">Likes</div></div>
      </div>
      ${isMe&&!u.isGuest?`<button class="edit-btn" onclick="showEditProfile()">Edit Profile</button>`:''}
      ${isMe&&u.isGuest?`<div style="margin-top:.75rem;font-size:.8rem;color:var(--text3);">Guest accounts cannot edit their profile.</div>`:''}
      ${!isMe?`<button class="edit-btn" onclick="navigate('chats');setTimeout(()=>openDM('${uid2}'),80)">Message</button>`:''}
    </div>
    <div class="section-header" style="margin-top:1.25rem"><div class="section-h">Posts</div></div>
    ${myPosts.length?myPosts.map(p=>postHTML(p)).join(''):'<div class="empty-state"><p>No posts yet.</p></div>'}`;
}
function showEditProfile(){
  makeModal('Edit Profile');
  document.getElementById('modal-body').innerHTML+=`
    <div class="form-group">
      <label class="form-label">Display Name</label>
      <input class="form-input" id="ep-name" value="${escHtml(state.user?.name||'')}"/>
    </div>
    <div class="form-group">
      <label class="form-label">Bio</label>
      <textarea class="form-textarea" id="ep-bio">${escHtml(state.user?.bio||'')}</textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveProfile()">Save</button>
    </div>`;
}
function saveProfile(){
  const name=document.getElementById('ep-name')?.value?.trim();
  const bio=document.getElementById('ep-bio')?.value?.trim();
  if(name)state.user.name=name;
  if(bio!==undefined)state.user.bio=bio;
  saveState();updateSidebarUser();closeModal();renderProfile('me');showToast('Profile updated! ✨');
}

/* ===== SETTINGS ===== */
function renderSettings(){
  document.getElementById('content').innerHTML=`
    <div class="settings-section">
      <div class="settings-title">Appearance</div>
      <div class="setting-row">
        <div><div class="setting-label">Theme</div><div class="setting-sub">Choose your colour palette</div></div>
        <div class="theme-btns">
          <button class="theme-btn ${state.theme==='light-amber'?'active':''}" onclick="setTheme('light-amber',this)">☀️ Amber</button>
          <button class="theme-btn ${state.theme==='dark-amber'?'active':''}" onclick="setTheme('dark-amber',this)">🌙 Amber</button>
          <button class="theme-btn ${state.theme==='light-lapis'?'active':''}" onclick="setTheme('light-lapis',this)">☀️ Lapis</button>
          <button class="theme-btn ${state.theme==='dark-lapis'?'active':''}" onclick="setTheme('dark-lapis',this)">🌙 Lapis</button>
        </div>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-title">Account</div>
      <div class="setting-row">
        <div><div class="setting-label">Status</div><div class="setting-sub">${state.user?.isGuest?'Guest Account':'Registered Account'}</div></div>
        ${state.user?.isGuest?`<button class="theme-btn" onclick="showToast('Sign up coming soon!')">Sign up</button>`:''}
      </div>
      <div class="setting-row">
        <div><div class="setting-label">Sign out</div></div>
        <button class="theme-btn" onclick="signOut()">Sign out</button>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-title">About Ember</div>
      <div class="setting-row"><div class="setting-label">Version</div><div style="color:var(--text3);font-size:.85rem;">1.0.0</div></div>
      <div class="setting-row"><div class="setting-label">Made with</div><div style="color:var(--accent);font-size:.85rem;">🔥 passion</div></div>
    </div>`;
}
function signOut(){
  state.user=null;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('auth-page').style.display='flex';
  saveState();
}

/* ===== MODAL HELPERS ===== */
function makeModal(title){
  closeModal();
  const ov=document.createElement('div');
  ov.className='modal-overlay';ov.id='modal-overlay';
  ov.innerHTML=`<div class="modal"><div class="modal-title">${title}</div><div id="modal-body"></div></div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});
  document.body.appendChild(ov);
  return document.getElementById('modal-body');
}
function closeModal(){const o=document.getElementById('modal-overlay');if(o)o.remove();}

/* ===== SCROLL ===== */
function scrollToBottom(id){const el=document.getElementById(id);if(el)setTimeout(()=>el.scrollTop=el.scrollHeight,50);}

/* ===== INIT ===== */
function init(){
  const saved=ls('ember_data2');
  if(saved&&saved.posts){
    Object.assign(state,saved);
    document.body.setAttribute('data-theme',state.theme||'light-amber');
    SAMPLE_USERS.forEach(u=>{if(!state.users[u.id])state.users[u.id]=u;});
  } else {
    initSampleData();
  }
  if(state.user){
    document.getElementById('auth-page').style.display='none';
    document.getElementById('app').classList.add('visible');
    updateSidebarUser();
    navigate('feed');
  }
}
init();
</script>
</body>
</html>
